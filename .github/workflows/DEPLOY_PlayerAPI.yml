# Workflow to physically deploy Files API to the CI server
name: Deploy Script - PlayerAPI
run-name: ${{ format('{0} - {1}', github.workflow, github.event_name == 'push' && github.event.head_commit.message || 'Manual Run') }}
on:
  workflow_call:
    inputs:
      deploy_host:
        type: string
        description: "The host on which to deploy."
        required: true
        default: ${{ vars.OGD_STAGING_HOST }}
      branch:
        type: string
        description: "The specific branch to deploy to/from. This is used because workflow dispatches appear to default to main branch."
        required: true
      remove:
        type: boolean
        description: "Whether to remove the deploy for the current branch."
        required: true
        default: false
      as_latest:
        type: boolean
        description: "Whether to also deploy/remove as the 'latest' version of API"
        required: false
        default: false

env:
  DEPLOY_HOST: ${{ inputs.deploy_host }}
  DEPLOY_DIR:                            ${{ vars.API_BASE_PATH }}/players/${{ inputs.branch }}
  DEPLOY_URL:  ${{ inputs.deploy_host }}/${{ vars.API_BASE_URL  }}/players/${{ inputs.branch }}/app.wsgi
  DEPLOY_DIR_LATEST:                     ${{ vars.API_BASE_PATH }}/players/latest

jobs:
  deploy_fileapi:
    name: Deploy PlayerAPI
    if: inputs.remove == false
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}-deploy
      cancel-in-progress: true

    steps:

    - name: Announce deploy
      run: echo "Deploying to ${{ env.DEPLOY_URL }}"

    # 1. Local checkout & config
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Get current version tag
      id: version-tag
      run: |
        echo "VERSION_TAG=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
    - name: Set up Config File
      uses: ./.github/actions/PlayerAPI_config
      with:
        db_host: ${{ vars.OGD_LOGGER_HOST }}
        db_user: ${{secrets.SQL_USER}}
        db_pass: ${{secrets.SQL_PASS}}
        id_gen_db_name: ${{ secrets.DBNAME_ID_GEN }}
        fd_users_db_name: ${{ secrets.DBNAME_FD_USERS }}
        remote_app_path: ${{ env.DEPLOY_DIR }}
        api_version:     ${{ steps.version-tag.outputs.VERSION_TAG }}-${{ github.ref_name }}-${{ github.sha }}

    # 2. Build 

    # 3. Remote config & deploy
    - name: Connect to VPN
      uses: opengamedata/actions-openconnect-vpn@v1.1
      with:
        username: ${{ secrets.VPN_USER }}
        password: ${{ secrets.VPN_PASS }}
        endpoint: "soe.vpn.wisc.edu"

    - name: Upload requirements.txt
      run: scp -o StrictHostKeyChecking=no -o ConnectTimeout=30 -T -i ./key.txt ./requirements.txt ${{ secrets.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}

    - name: Deploy to Server
      uses: opengamedata/actions-deploy-project@v1.2
      with:
        local_path: ./src
        remote_path: ${{ env.DEPLOY_DIR }}
        remote_host: ${{ env.DEPLOY_HOST }}
        remote_user: ${{ secrets.DEPLOY_USER }}
        remote_key:  ${{ secrets.DEPLOY_KEY }}
        with_venv: true

    - name: Deploy as Latest
      if: ${{ inputs.as_latest }}
      uses: opengamedata/actions-deploy-project@v1.2
      with:
        local_path: ./src
        remote_path: ${{ env.DEPLOY_DIR_LATEST }}
        remote_host: ${{ env.DEPLOY_HOST }}
        remote_user: ${{ secrets.DEPLOY_USER }}
        remote_key:  ${{ secrets.DEPLOY_KEY }}
        with_venv: true

    # 4. Cleanup & complete
    - name: Restart httpd via ssh
      run: ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -T -i ./key.txt ${{ secrets.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "sudo systemctl restart apache2"

  branch_delete:
    name: Remove FileAPI Deploy
    if: inputs.remove == true
    runs-on: ubuntu-22.04
    concurrency:
      group: ${{ github.repository }}-${{ github.ref }}-${{ github.workflow }}
      cancel-in-progress: false
    
    steps:
    
    - name: Announce cleanup
      run: echo "Removing branch deploy at ${{ env.DEPLOY_URL }}"

    # 1. Local checkout & config
    
    # 2. Build 

    # 3. Remote config & clean
    - name: Connect to VPN
      uses: opengamedata/actions-openconnect-vpn@v1.1
      with:
        username: ${{ secrets.VPN_USER }}
        password: ${{ secrets.VPN_PASS }}
        endpoint: "soe.vpn.wisc.edu"

    - name: Setup Access Key
      run: |
        mkdir -p ~/.ssh
        echo '${{secrets.CLEAN_KEY}}' >> ./key.txt
        chmod 600 ./key.txt

    - name: Remove branch folder
      run: ssh -o StrictHostKeyChecking=no -T -i ./key.txt ${{ secrets.CLEAN_USER }}@${{ env.DEPLOY_HOST }} "rm -r ${{ env.DEPLOY_DIR }}"
    # This allows us to yank down a recent release, if needed. Generally don't intend to do this.
    - name: Remove 'latest' folder
      if: ${{ inputs.as_latest }}
      run: ssh -o StrictHostKeyChecking=no -T -i ./key.txt ${{ secrets.CLEAN_USER }}@${{ env.DEPLOY_HOST }} "rm -r ${{ env.DEPLOY_DIR_LATEST }}"

    - name: Upload logs as artifacts
      uses: actions/upload-artifact@v4
      with:
        path: ./*.log